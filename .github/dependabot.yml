version: 2
updates:
  - package-ecosystem: "gomod"
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Tokyo
    labels:
      - dependencies
      - go
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Tokyo
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5
