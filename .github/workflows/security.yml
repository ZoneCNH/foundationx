name: foundationx-security

on:
  pull_request:
  push:
    branches:
      - main

env:
  GOWORK: "off"

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Install security tools
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Boundary gate
        run: make boundary

      - name: Security gate
        run: make security

      - name: Contract gate
        run: make contracts
