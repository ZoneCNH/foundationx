name: kernel-security

on:
  pull_request:
  push:
    branches:
      - main

env:
  GOWORK: "off"

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.26.3"

      - name: Cache Go tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: $(go env GOPATH)/bin
          key: go-tools-${{ runner.os }}-security-${{ hashFiles('.github/versions.env') }}
          restore-keys: |
            go-tools-${{ runner.os }}-security-

      - name: Setup Go for pinned gosec
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.23"

      - name: Install pinned gosec
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          source .github/versions.env
          go install github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}

      - name: Restore security Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.26.3"

      - name: Install security tools
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          source .github/versions.env
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          go install gotest.tools/gotestsum@${GOTESTSUM_VERSION}
          go install mvdan.cc/gofumpt@${GOFUMPT_VERSION}
          go install honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/ci/*.sh

      - name: Toolchain gate
        run: make release-toolchain-check

      - name: Boundary gate
        run: make boundary

      - name: Security gate
        run: make security

      - name: Contract gate
        run: make contracts

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357
        with:
          sarif_file: govulncheck.sarif
        continue-on-error: true
