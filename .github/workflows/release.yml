name: kernel-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GOWORK: "off"
  VERSION: ${{ github.ref_name }}

jobs:
  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.26.3"

      - name: Cache Go tools
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: $(go env GOPATH)/bin
          key: go-tools-${{ runner.os }}-release-${{ hashFiles('.github/versions.env') }}
          restore-keys: |
            go-tools-${{ runner.os }}-release-

      - name: Setup Go for pinned gosec
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.23"

      - name: Install pinned gosec
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          source .github/versions.env
          go install github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}

      - name: Restore release Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.26.3"

      - name: Install release gate tools
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          source .github/versions.env
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          go install gotest.tools/gotestsum@${GOTESTSUM_VERSION}
          go install mvdan.cc/gofumpt@${GOFUMPT_VERSION}
          go install honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/ci/*.sh

      - name: Release final check
        run: make release-final-check

      - name: Upload release manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: kernel-release-manifest
          path: |
            release/manifest/*.json
            release/manifest/*.json.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            release/manifest/*.json
            release/manifest/*.json.sha256
          generate_release_notes: true
