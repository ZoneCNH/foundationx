name: kernel-standard-sync-watch

on:
  schedule:
    - cron: "17 3,15 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kernel-standard-sync-watch
  cancel-in-progress: false

jobs:
  upstream-drift:
    name: Detect xlib-standard drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/ci/*.sh

      - name: Check live upstream drift
        id: drift
        continue-on-error: true
        env:
          STANDARD_DRIFT_LIVE: "1"
        run: ./scripts/check_standard_drift.sh

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: kernel-standard-sync-report
          path: release/standard-sync/latest.md
          if-no-files-found: warn

      - name: Fail on unreviewed upstream drift
        if: steps.drift.outcome == 'failure'
        run: |
          echo "xlib-standard upstream drift detected or standard drift gate failed."
          echo "Review release/standard-sync/latest.md and the watched-path diff before updating .standard-sync.yaml."
          exit 1
