name: kernel-ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  GOWORK: "off"

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        go-version: ["1.26.3", "1.23"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go tools
        if: matrix.go-version == '1.26.3'
        uses: actions/cache@v4
        with:
          path: $(go env GOPATH)/bin
          key: go-tools-${{ runner.os }}-${{ matrix.go-version }}-${{ hashFiles('.github/versions.env') }}
          restore-keys: |
            go-tools-${{ runner.os }}-${{ matrix.go-version }}-

      - name: Install quality tools
        if: matrix.go-version == '1.26.3'
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          source .github/versions.env
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          go install gotest.tools/gotestsum@${GOTESTSUM_VERSION}
          go install mvdan.cc/gofumpt@${GOFUMPT_VERSION}
          go install honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}

      - name: Make scripts executable
        if: matrix.go-version == '1.26.3'
        run: chmod +x scripts/*.sh scripts/ci/*.sh

      - name: Toolchain gate
        if: matrix.go-version == '1.26.3'
        run: make release-toolchain-check

      - name: CI
        if: matrix.go-version == '1.26.3'
        run: make ci

      - name: Minimum Go compatibility
        if: matrix.go-version == '1.23'
        run: |
          go vet ./...
          go test -count=1 ./...

      - name: Generate evidence
        if: matrix.go-version == '1.26.3'
        run: make evidence

      - name: Check generated evidence
        if: matrix.go-version == '1.26.3'
        run: make release-evidence-check

      - name: Upload release manifest
        if: matrix.go-version == '1.26.3'
        uses: actions/upload-artifact@v7
        with:
          name: kernel-release-manifest-${{ matrix.go-version }}
          path: |
            release/manifest/*.json
            release/manifest/*.json.sha256
