standard_source:
  repo: ZoneCNH/xlib-standard
  branch: main
  role: template-and-standard-source
  url: https://github.com/ZoneCNH/xlib-standard
  watched_paths:
    - docs/standard/
    - contracts/
    - .agent/
    - cmd/goalcli/
    - internal/goalcli/
    - internal/goalruntime/
    - docs/standard/goalcli-cli-contract.md
    - docs/standard/goalcli-runtime.md
    - .agent/standard/goalcli-mapping.md
    - contracts/goalcli-report.schema.json
    - Makefile
    - scripts/check_docs.sh
    - scripts/check_contracts.sh
    - scripts/generate_manifest.sh
  goalcli_sync:
    mode: runtime-dependency-required
    adoption: required
    runtime_dependency: required
    dependency_module: github.com/ZoneCNH/xlib-standard
    dependency_import_policy: public-go-package-required
    current_upstream_status: blocked-cmd-main-and-internal-only
    decision_evidence: docs/adr/ADR-20260604-001-goalcli-runtime-dependency.md
    copy_into_kernel: forbidden-without-approved-scope
    source_paths:
      - cmd/goalcli/
      - internal/goalcli/
      - internal/goalruntime/
      - docs/standard/goalcli-cli-contract.md
      - docs/standard/goalcli-runtime.md
      - .agent/standard/goalcli-mapping.md
      - contracts/goalcli-report.schema.json

target:
  repo: ZoneCNH/kernel
  module: github.com/ZoneCNH/kernel
  role: l0-kernel-library
  template_runtime_dependency: goalcli-runtime-only-approved
  overwrite_from_template: forbidden
  sync_policy:
    docs_standard: required
    contracts: required
    harness_gates: required
    goalcli: runtime-dependency-required
    goalcli_runtime_dependency: required
    goalcli_import_policy: public-go-package-required
    goalcli_current_upstream_status: blocked-cmd-main-and-internal-only
    goalcli_decision_evidence: docs/adr/ADR-20260604-001-goalcli-runtime-dependency.md
    goalcli_copy_into_kernel: forbidden-without-approved-scope
    generator: forbidden
    template_profile: forbidden
    profile_runtime: forbidden

last_synced:
