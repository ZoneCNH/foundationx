  date: "2026-06-01"
  evidence: docs/xlib-standard-analysis.md

drift_check:
  default_mode: local-pinned-baseline
  live_network_gate: false
  live_network_mode: optional-fail-on-drift
  report: release/standard-sync/latest.md

live_review:
