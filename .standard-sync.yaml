standard_source:
  repo: ZoneCNH/xlib-standard
  branch: main
  watched_paths:
    - docs/standard/
    - contracts/
    - .agent/
    - Makefile
    - scripts/check_docs.sh
    - scripts/check_contracts.sh
    - scripts/generate_manifest.sh

target:
  repo: ZoneCNH/kernel
  sync_policy:
    docs_standard: required
    contracts: required
    harness_gates: required
    generator: forbidden
    template_profile: forbidden
    profile_runtime: forbidden

last_synced:
  commit: "041a62f21428111a4b46235a7910edbdf4e07d61"
  date: "2026-06-01"
  evidence: docs/xlib-standard-analysis.md

drift_check:
  default_mode: local-pinned-baseline
  live_network_gate: false
  report: release/standard-sync/latest.md
